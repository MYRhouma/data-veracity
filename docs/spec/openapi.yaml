---
openapi: 3.1.1
info:
  title: Data Veracity Assurance
  description: |-
    This is the API specification of the
    [data veracity assurance building block (DVA)](https://github.com/Prometheus-X-association/data-veracity).

    The DVA is organized as six cooperating services — each owns exactly one
    role. The `servers` block below lists all of them; each endpoint is tagged
    with the owning service.

    **Topology:**

    | Location | Service | Role |
    |---|---|---|
    | Participant | `dva-api` (Kotlin/Ktor) | HTTP gateway — orchestrates the synchronous attestation flow (VLA resolution, evaluation, credential issuance) |
    | Participant | `dva-vc-manager` (Python/FastAPI) | Ed25519 JWS issuance & verification via PyNaCl; owns the did:key whitelist |
    | Participant | `dva-processing` (Python/FastAPI) | Stateless veracity checks (`POST /evaluate-batch`) |
    | Data Intermediary | `vla-manager-api` (Python/FastAPI) | Sole owner of VLAs |
    | Data Intermediary | `dva-processing-vla-manager` (Python/FastAPI) | `POST /evaluate` only — used while authoring VLAs, never during attestation |
  contact:
    email: bpeter@edu.bme.hu
  version: 0.6.0
servers:
  - url: http://localhost:9091
    description: DVA API — Test environment, provider side
  - url: http://localhost:9092
    description: DVA API — Test environment, consumer side
  - url: http://localhost:9090
    description: DVA API — Local development server
  - url: http://localhost:9099
    description: VLA MANAGER API — Data Intermediary (test environment)
  - url: http://localhost:8001
    description: DVA VC MANAGER — Test environment, provider side
  - url: http://localhost:8002
    description: DVA VC MANAGER — Test environment, consumer side
  - url: '{server}'
    description: Custom parameterizable server
    variables:
      server:
        default: http://localhost:9090
        description: Custom server URL
tags:
  - name: VLA
    description: Endpoints related to veracity level agreements (VLAs) — served by the VLA MANAGER API at the Data Intermediary
  - name: Templates
    description: Endpoints related to the management of VLA templates — served by the VLA MANAGER API at the Data Intermediary
  - name: AoV
    description: Endpoints related to attestations of veracity (AoVs) — served by the DVA API
  - name: AoV Issue
    description: Endpoints for issuing AoV JWS credentials — served by the DVA VC MANAGER
  - name: AoV Verify
    description: Endpoints for verifying AoV JWS credentials — served by the DVA VC MANAGER
  - name: Admin
    description: Admin endpoints for managing the did:key whitelist and signing keys — served by the DVA VC MANAGER
  - name: PoV
    description: Endpoints related to proofs of veracity (PoVs) — future
  - name: Evaluation
    description: Endpoints related to evaluating VLAs/requirements — served by DVA PROCESSING
  - name: Info
    description: Endpoints related to retrieving information about the running instance
  - name: Dev
    description: Endpoints meant to be used only for development
  - name: Future
    description: Endpoints that are not available yet but will be implemented in the
      future
paths:
  /template:
    post:
      tags: [Templates]
      summary: Create new VLA template
      description: >
        Add a new **VLA template** to the database.
        An ID will be automatically generated for the template.
        A `201 CREATED` response is given if the template has been successfully created.
        Otherwise, you will get a `400 BAD REQUEST` (in case of invalid request data).
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
            examples:
              PropertyValueBetween:
                summary: Property value between min-max with GE
                value:
                  name: Property Value Between Min-Max
                  description: >-
                    The value of a JSON property has to fall between a
                    minimum and a maximum value; evaluated using
                    GreatExpectations
                  criterionType: IN_RANGE
                  targetAspect: ACCURACY
                  evaluationMethod:
                    engine: GREAT_EXPECTATIONS
                    variableSchema:
                      properties:
                        property:
                          type: string
                        minimum:
                          type: string
                        maximum:
                          type: string
                    implementationTemplate: |
                      ---
                      type: ExpectColumnValuesToBeBetween
                      kwargs:
                        column: {{ property }}
                        min_value: '{{ minimum }}'
                        max_value: '{{ maximum }}'
                      meta:
                        schema:
                          columns:
                            {{ property }}:
                      ...
              PropertyNotBlank:
                summary: Property has a non-blank value
                value:
                  name: Property non-blank
                  description: >-
                    Checks that the value of a specific JSON property is
                    not blank (using jq)
                  criterionType: VALID_INVALID
                  targetAspect: COMPLETENESS
                  evaluationMethod:
                    engine: JQ
                    variableSchema:
                      properties:
                        property:
                          type: string
                    implementationTemplate: >-
                      if {{ property }} != ''
                      then {
                        success: true,
                        details: '{{ property }} is a valid nonempty string'
                      }
                      else {
                        success: false,
                        details: '{{ property }} is blank'
                      }
                      end
              JsonShema:
                summary: JSON data conforms to schema
                value:
                  name: JSON Schema
                  description: >-
                    Data should conform to a JSON schema.  The `schema`
                    is an entire JSON schema string.
                  criterionType: VALID_INVALID
                  targetAspect: SYNTAX
                  evaluationMethod:
                    engine: SCHEMA
                    variableSchema:
                      properties:
                        schema:
                          type: string
                    implementationTemplate: '{{ schema }}'
              PropertyExpression:
                summary: >-
                  A property in the JSON data conforms to a simple
                  requirement
                value:
                  name: JQ Property Expression
                  description: >-
                    A specific property in the JSON data must fulfill a
                    basic requirement of either being equal or not equal
                    to a given value.
                  criterionType: VALID_INVALID
                  targetAspect: SYNTAX
                  evaluationMethod:
                    engine: JQ
                    variableSchema:
                      properties:
                        property:
                          type: string
                        operator:
                          type: string
                          enum: [==, '!=']
                        operand:
                          type: boolean
                          enum: [true, false]
                    implementationTemplate: >-
                      { success: {{ property }} {{{ operand }}} {{ operator }} }
      responses:
        '201':
          $ref: '#/components/responses/Created'
        '400':
          $ref: '#/components/responses/InvalidData'
    get:
      tags: [Templates]
      summary: Get all VLA templates
      description: >
        Returns all available **VLA templates** from the database as an array.
      operationId: getTemplates
      responses:
        '200':
          description: The list of available VLA templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateArray'
    delete:
      tags: [Dev]
      summary: Delete all VLA templatees
      description: >
        Delete all **VLA templates**.
        Should always respond with `204 NO CONTENT`.
      operationId: deleteTemplates
      responses:
        '204':
          $ref: '#/components/responses/Deleted'
  /template/{id}:
    parameters:
      - $ref: '#/components/parameters/idParam'
    get:
      tags: [Templates]
      summary: Get VLA template by ID
      description: >
        Queries a specific **VLA template** by its unique ID.
        Responds either with `200 OK` and the contents of the requested template or
        with `404 NOT FOUND` if no VLA template with the specified ID exists.
      operationId: getTemplate
      responses:
        '200':
          description: Returning requested VLA template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Templates]
      summary: Update VLA template
      description: >
        Used to update an existing **VLA template** specified by its ID.
        The request body should contain a partial VLA template object – only specified
        fields will be updated, if possible.
        Responds with `200 OK` if the update operation was successful or `404 NOT
        FOUND` if no VLA template with the specified ID exists.
      operationId: updateTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateUpdate'
      responses:
        '200':
          $ref: '#/components/responses/UpdatedTemplate'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Templates]
      summary: Delete VLA template
      description: >
        Delete a **VLA template** specified by its ID.
        Responds `204 NO CONTENT` if the template was successfully deleted or `404  FOUND`
        if no template with the specified ID exists.
      operationId: deleteTemplate
      responses:
        '204':
          $ref: '#/components/responses/Deleted'
        '404':
          $ref: '#/components/responses/NotFound'
  /template/{id}/render:
    parameters:
      - $ref: '#/components/parameters/idParam'
    post:
      tags: [Templates]
      summary: Render a VLA template
      description: >
        Render a VLA template to a complete _data quality fragment_ ready to be included
        in a VLA.
        Responds with `200 OK` and the rendered template on success or with `400 BAD
        REQUEST` if the template could not be rendered.
      operationId: renderTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateModel'
      responses:
        '200':
          description: The rendered template
          content:
            application/json:
              schema:
                type: object
              example:
                engine: JQ
                implementation: >-
                  { success: .url == 'http://example.com' and .someValue == 42 }
        '400':
          $ref: '#/components/responses/InvalidData'
  /vla:
    post:
      tags: [VLA]
      summary: Create a new VLA
      description: >
        Create a new **Veracity Level Agreement (VLA).**
        Responds `201 CREATED` if the VLA was successfully created or `400 BAD REQUEST`
        if creation failed.
      operationId: createVLA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VLACreate'
      responses:
        '201':
          $ref: '#/components/responses/Created'
        '400':
          $ref: '#/components/responses/InvalidData'
    get:
      tags: [VLA]
      summary: Get all VLAs
      description: >
        Returns all available **Veracity Level Agreements** from the database as an
        array.
      operationId: getVLAs
      responses:
        '200':
          description: The list of known VLAs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VLAArray'
    delete:
      tags: [Dev]
      summary: Delete all VLAs
      description: >
        Delete all **Veracity Level Agreeements.**
        Should always respond with `204 NO CONTENT`.
      operationId: deleteVLAs
      responses:
        '204':
          $ref: '#/components/responses/Deleted'
  /vla/from-templates:
    post:
      tags: [VLA]
      summary: Create a new VLA using template rendering
      description: >
        Create a new **Veracity Level Agreement (VLA).**
        Responds `201 CREATED` if the VLA was successfully created or `400 BAD REQUEST`
        if creation failed.
      operationId: createVLAFromTemplates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VLACreateFromTemplates'
      responses:
        '201':
          $ref: '#/components/responses/Created'
        '400':
          $ref: '#/components/responses/InvalidData'
  /vla/{id}:
    parameters:
      - $ref: '#/components/parameters/idParam'
    get:
      tags: [VLA]
      summary: Get VLA by ID
      description: >
        Queries a specific **Veracity Level Agreement** by its unique ID.
        Responds either with `200 OK` and the contents of the requested VLA or with
        `404 NOT FOUND` if no VLA with the specified ID exists.
      operationId: getVLA
      responses:
        '200':
          description: Returning requested VLA
          content:
            application/json:
              schema:
                $ref: https://raw.githubusercontent.com/bitol-io/open-data-contract-standard/refs/heads/main/schema/odcs-json-schema-latest.json
        '404':
          $ref: '#/components/responses/NotFound'
  /attestation:
    post:
      tags: [AoV]
      summary: Submit an attestation request
      description: >
        Create a new **AoV request** for a given data exchange.

        The DVA API orchestrates the **synchronous attestation flow**:
          - **Initiation:** PDC sends raw data + a VLA ID via this endpoint.
          - **VLA Resolution:** DVA API resolves the full VLA via `GET /vla/{id}` on
            the VLA MANAGER API (hosted at the Data Intermediary), which returns the
            complete VLA document.
          - **Veracity Checks:** DVA API sends the VLA + data to
            `POST /evaluate-batch` on DVA PROCESSING, which returns an array of
            (requirement, result) pairs.
          - **Credential Issuance:** DVA API asks `POST /aov/issue` on the DVA VC
            MANAGER to sign the JWS; the DVA VC MANAGER returns the Ed25519 JWS
            (EdDSA via PyNaCl — no custom crypto).
          - **Synchronous Return:** DVA API returns the completed AoV JWS
            **synchronously** in this response.

        If the veracity checks fail, `evaluationPassing` is `false` and `jws`/`vcId`
        are `null`. A `200 OK` is returned either way.

        In the case of an invalid request (e.g., malformed `vlaId`), the response is
        `400 BAD REQUEST`.
      operationId: requestAov
      operationId: requestAov
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttestationRequest'
            examples:
              JsonSchemaAndPropertyExpressions:
                summary: >-
                  Check that data conforms to a JSON schema and that
                  some property checks pass
                value:
                  exchangeID: xchg-0001
                  contract:
                    id: contract-0001
                    dataProvider: /catalog/participants/provider-test-id
                    dataConsumer: /catalog/participants/consumer-test-did
                    serviceOffering: /catalog/serviceofferings/serviceoffering-test-did
                    purpose: []
                    negotiators:
                      - did: /catalog/participants/provider-test-id
                      - did: /catalog/participants/consumer-test-did
                    status: PENDING
                    policy:
                      - uid: /policy/policy-0-uid
                        permission:
                          - type: permission
                            uid: /target/3f8d1b0e-8e2e-4b69-9b1f-089fe2f3e9d7
                            action: use
                    vla:
                      id: ddf4a56a-228b-461c-9448-d0e16135e315
                      kind: DataContract
                      schema:
                        name: xapi_statement
                        logicalType: object
                        properties:
                          - name: actor
                            logicalType: object
                            required: true
                          - name: verb
                            logicalType: object
                            required: true
                          - name: object
                            logicalType: object
                            required: true
                          - name: result
                            logicalType: object
                            required: true
                          - name: timestamp
                            logicalType: string
                            required: true
                        quality:
                          - engine: SCHEMA
                            implementation:
                              $schema: https://json-schema.org/draft-07/schema
                              title: Minimal xAPI Statement
                              description: >-
                                This is not the full xAPI JSON schema,
                                just a minimal subset for testing.
                              type: object
                              properties:
                                actor:
                                  type: object
                                  properties:
                                    name:
                                      type: string
                                    mbox:
                                      type: string
                                      format: email
                                  required: [name]
                                verb:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                      format: uri
                                  required: [id]
                                object:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                      format: uri
                                    definition:
                                      type: object
                                      properties:
                                        name:
                                          type: object
                                          properties:
                                            en-US:
                                              type: string
                                          required: [en-US]
                                        description:
                                          type: object
                                          properties:
                                            en-US:
                                              type: string
                                          required: [en-US]
                                        type:
                                          type: string
                                          format: uri
                                      required: [name, type]
                                  required: [definition, id]
                                result:
                                  type: object
                                  properties:
                                    success:
                                      type: boolean
                                  required: [success]
                                timestamp:
                                  type: string
                                  format: date-time
                              required: [actor, object, result, timestamp, verb]
                          - engine: JQ
                            implementation: '{ success: .result.success }'
                          - engine: JQ
                            implementation: >-
                              { success: .actor.name | contains('Dupont') }
                  attesterID: attester-0000
                  data:
                    actor:
                      name: Jean Dupont
                      mbox: mailto:jeandupont@example.com
                    verb:
                      id: http://adlnet.gov/expapi/verbs/interacted
                    object:
                      id: https://navy.mil/netc/xapi/activities/simulations/b9e16535-4fc9-4c66-ac87-3ad7ce515f5c/events/0221144
                      definition:
                        name:
                          en-US: Event in Simulator
                        description:
                          en-US: You're wearing all your PPE
                        type: http://adlnet.gov/expapi/activities/interaction
                    result:
                      success: true
                    timestamp: '2025-03-16T03:25:00Z'
      responses:
        '200':
          description: Synchronous response — the AoV JWS (if all checks pass) or null JWS (if checks fail).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AoVResponse'
        '400':
          $ref: '#/components/responses/InvalidData'
        '404':
          description: VLA not found at the Data Intermediary
        '502':
          description: Downstream service (VLA MANAGER API, DVA PROCESSING, or DVA VC MANAGER) unreachable
  /attestation/verify:
    post:
      tags: [AoV]
      summary: Submit an AoV verification request
      description: >
        Verify an AoV JWS credential. The DVA API delegates this request
        body-and-all to `POST /aov/verify` on the DVA VC MANAGER, which owns
        the `did:key` whitelist and performs Ed25519 signature verification
        via PyNaCl.

        The verification is **fail-closed**: if the whitelist is empty, all
        verifications are rejected. If the attester's `did:key` is not in the
        whitelist, the response is `verified: false`. A malformed JWS returns
        `400 BAD REQUEST`; a tampered JWS returns `200` with `verified: false`.
      operationId: requestAovVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Verification result — `{verified, reason, payload}`. `verified` is true only if the attester is whitelisted AND the signature is valid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResponse'
        '400':
          description: Malformed JWS (not a valid 3-part compact JWS)
        '502':
          description: DVA VC MANAGER unreachable
  /proof:
    post:
      tags: [Future]
      summary: Submit proof generation request
      description: >
        Create a new **PoV request** for a given data exchange.
        Requests are processed asynchronously.
        If your request has been accepted for processing, the response will be `202
        ACCEPTED`.
        Otherwise, in the case of an invalid request, you will get a `400 BAD REQUEST`
        error.
      operationId: requestPov
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProofRequest'
      responses:
        '202':
          $ref: '#/components/responses/Accepted'
        '400':
          $ref: '#/components/responses/InvalidData'
  /proof/verify:
    post:
      tags: [Future]
      summary: Submit PoV verification request
      description: >
        Create a new **PoV verification request** for a given PoV.
        Requests are processed asynchronously.
        If your request has been accepted for processing, the response will be `202
        ACCEPTED`.
        Otherwise, in the case of an invalid request, you will get a `400 BAD REQUEST`
        error.
      operationId: requestPovVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '202':
          $ref: '#/components/responses/Accepted'
        '400':
          $ref: '#/components/responses/InvalidData'
  /evaluate:
    post:
      tags: [Evaluation]
      summary: Evaluate a single requirement against some data
      description: >
        Takes some requirement (that could be part of a VLA) and a piece of data in
        the request body.
        The response is the result of evaluating the requirement on that data.

        **Data-Intermediary-only endpoint.** Used by the `dva-processing-vla-manager`
        service to test a single requirement against candidate data *while authoring*
        a VLA. It is **not** invoked during the attestation flow — the DVA API uses
        `POST /evaluate-batch` (below) instead.
      operationId: evaluate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRequest'
      responses:
        '200':
          $ref: '#/components/responses/Evaluated'
        '400':
          $ref: '#/components/responses/InvalidData'
  /evaluate-batch:
    post:
      tags: [Evaluation]
      summary: Evaluate every requirement in a VLA against some data
      description: >
        Takes the full VLA document (as retrieved from the VLA MANAGER API) and
        a piece of data in the request body.
        Loops over `vla.schema[*].quality[*]` and returns one evaluation result per
        requirement — the "array of (requirement, result) pairs" produced by the
        veracity checks in the synchronous attestation flow.

        **Participant-side endpoint.** Called by the DVA API during veracity checks
        in the attestation flow. DVA PROCESSING is stateless and never writes to
        Postgres — the DVA API owns the RequestLog audit row.
      operationId: evaluateBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationBatchRequest'
      responses:
        '200':
          description: Array of evaluation results — one per requirement
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EvaluationResult'
        '400':
          $ref: '#/components/responses/InvalidData'
  /evaluate/from-template:
    post:
      tags: [Evaluation]
      summary: Render a template and evaluate the result against data
      description: >
        Takes a template ID and some data in the request body.
        The template with the given ID is rendered internally and the resulting
        requirement is evaluated on the data passed.

        **Data-Intermediary-only endpoint.** Used while authoring VLAs.
      operationId: evaluteFromTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationFromTemplateRequest'
      responses:
        '200':
          $ref: '#/components/responses/Evaluated'
        '400':
          $ref: '#/components/responses/InvalidData'
        '404':
          $ref: '#/components/responses/NotFound'
  # ---- DVA VC MANAGER endpoints (Participant) ----
  /aov/issue:
    post:
      tags: [AoV Issue]
      summary: Issue an AoV JWS credential
      description: >
        Signs an Attestation of Veracity as a W3C VC 2.0 JSON-LD JWS using
        Ed25519/EdDSA (via PyNaCl — no hand-rolled cryptography). The JWS
        header is `{"alg":"EdDSA","typ":"VC+LD-JSON+JWS"}` and the payload
        shape is byte-identical across the Kotlin and Python implementations.

        **Called by the DVA API during credential issuance in the synchronous attestation flow.**
        Not intended to be called directly by the PDC.
      operationId: issueAov
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AovIssueRequest'
      responses:
        '200':
          description: The signed JWS plus metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AovIssueResponse'
        '400':
          $ref: '#/components/responses/InvalidData'
  /aov/verify:
    post:
      tags: [AoV Verify]
      summary: Verify an AoV JWS credential
      description: >
        Verifies an AoV JWS against the local `did:key` whitelist.

        **Fail-closed**: rejects all verifications when the whitelist is empty
        or when the attester's `did:key` is not registered. A tampered JWS
        returns `200` with `verified: false`; a malformed JWS returns `400`.

        **Called by the DVA API at the consumer side.** Not intended to be
        called directly by the PDC.
      operationId: verifyAov
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
      responses:
        '200':
          description: Verification result — `{verified, reason, payload}`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResponse'
        '400':
          description: Malformed JWS (not a valid 3-part compact JWS)
  /admin/whitelist:
    get:
      tags: [Admin]
      summary: List trusted attesters
      description: >
        Returns the `did:key` whitelist. Requires `Authorization: Bearer <key>`
        — fails-closed 401 when the `DVA_VC_MANAGER_API_KEY` env var is empty.
      operationId: listWhitelist
      responses:
        '200':
          description: Array of whitelist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WhitelistEntry'
        '401':
          description: API key not configured or invalid
    post:
      tags: [Admin]
      summary: Add a trusted attester's did:key to the whitelist
      operationId: addWhitelistEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhitelistAddRequest'
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhitelistEntry'
        '401':
          description: API key not configured or invalid
  /admin/whitelist/{did_key}:
    delete:
      tags: [Admin]
      summary: Remove a trusted attester's did:key from the whitelist
      operationId: removeWhitelistEntry
      parameters:
        - name: did_key
          in: path
          required: true
          schema:
            type: string
          description: The did:key identifier to remove
      responses:
        '204':
          description: Entry removed
        '404':
          description: did:key not in whitelist
        '401':
          description: API key not configured or invalid
  /admin/keys:
    get:
      tags: [Admin]
      summary: Get this service's own issuer did:key
      description: >
        Returns the `did:key` identifier derived from the service's persisted
        Ed25519 signing key. Read-only — no private bytes exposed.
      operationId: getOwnKey
      responses:
        '200':
          description: Issuer did:key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnKey'
        '401':
          description: API key not configured or invalid
  /info/requests:
    get:
      tags: [Info]
      summary: Get all DVA attestation/proof requests
      operationId: getRequests
      responses:
        '200':
          description: Returning all known requests
          content:
            application/json:
              schema:
                type: object
  /info/presentations:
    get:
      tags: [Info]
      summary: Get all DVA presentations/verifications
      operationId: getPresentations
      responses:
        '200':
          description: Returning all known presentations
          content:
            application/json:
              schema:
                type: object
  /info/credentials:
    get:
      tags: [Info]
      summary: Get all stored verifiable credentials
      operationId: getCredentials
      responses:
        '200':
          description: Returning all stored VCs
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Id:
      type: string
      example: 8e51e3a7-c614-4f5f-9ecf-8e2b032d72e4
    IdObject:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Id'
      required: [id]
      example:
        id: 8d70bc5f-f690-4b66-a7b0-c05c8c815dad
    TemplateArray:
      type: array
      items:
        $ref: '#/components/schemas/Template'
    Template:
      type: object
      required:
        - id
        - name
        - criterionType
        - targetAspect
        - evaluatoinMethod
      additionalProperties: false
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
        description:
          type: string
        criterionType:
          $ref: '#/components/schemas/CriterionType'
        targetAspect:
          $ref: '#/components/schemas/QualityAspect'
        evaluationMethod:
          type: object
          required: [engine, variableSchema, implementationTemplate]
          additionalProperties: false
          properties:
            engine:
              $ref: '#/components/schemas/QualityEngine'
            variableSchema:
              type: object
            implementationTemplate:
              type: string
      example:
        name: JSON Schema
        description: >-
          Data should conform to a JSON schema with the given URL
        criterionType: VALID_INVALID
        targetAspect: SYNTAX
        evaluationMethod:
          engine: SCHEMA
          variableSchema:
            properties:
              schemaURL:
                type: string
          implementationTemplate: '{{ schemaURL }}'
    TemplateCreate:
      allOf:
        - $ref: '#/components/schemas/Template'
    TemplateUpdate:
      allOf:
        - $ref: '#/components/schemas/Template'
    TemplateModel:
      type: object
      example:
        myUrl: http://example.com
        numericalVariable: 42
        arbitraryValues: are okay
    VLACreate:
      allOf:
        - $ref: https://raw.githubusercontent.com/bitol-io/open-data-contract-standard/refs/heads/main/schema/odcs-json-schema-latest.json
      example:
        description: Data is recent and valid
        schema:
          properties:
            timestamp:
              type: string
            result:
              type: integer
        quality:
          - engine: JQ
            implementation: '{ success: .timestamp >= "20250101T0000Z" }'
          - engine: JQ
            implementation: '{ success: .result >= 1 and .result <= 5 }'
    VLACreateFromTemplates:
      allOf:
        - $ref: https://raw.githubusercontent.com/bitol-io/open-data-contract-standard/refs/heads/main/schema/odcs-json-schema-latest.json
      example:
        description: Data is recent and valid
        schema:
          properties:
            timestamp:
              type: string
            result:
              type: integer
        qualityTemplates:
          - id: 718a3c91-886b-49c4-9f70-5198f98d21c0
            model:
              date: 20250101T000000Z
          - id: 28972cb3-a008-465b-a0d2-cd20ef45497a
            model:
              minimum: 1
              maximum: 5
    VLAArray:
      type: array
      items:
        $ref: https://raw.githubusercontent.com/bitol-io/open-data-contract-standard/refs/heads/main/schema/odcs-json-schema-latest.json
    CriterionType:
      type: string
      enum: [VALID_INVALID, IN_RANGE, GREATER_OR_LESS_THAN]
    QualityAspect:
      type: string
      enum: [SYNTAX, TIMELINESS, ACCURACY, COMPLETENESS, CONSISTENCY]
    QualityEngine:
      type: string
      enum: [SCHEMA, GREAT_EXPECTATIONS, JQ]
    VeracityRequest:
      type: object
      required: [exchangeID, contract, data]
      properties:
        exchangeID:
          type: string
          example: 75c411c0-4016-4f83-a3e8-66b137080d86
        contract:
          type: object
          required: [id, vla]
          additionalProperties: true
          properties:
            id:
              type: string
            vla:
              $ref: https://raw.githubusercontent.com/bitol-io/open-data-contract-standard/refs/heads/main/schema/odcs-json-schema-latest.json
        data:
          $ref: '#/components/schemas/AnyValue'
      example:
        exchangeID: xchg-0001
        contract:
          id: contract-0001
          dataProvider: /catalog/participants/provider-test-id
          dataConsumer: /catalog/participants/consumer-test-did
          serviceOffering: /catalog/serviceofferings/serviceoffering-test-did
          purpose: []
          negotiators:
            - did: /catalog/participants/provider-test-id
            - did: /catalog/participants/consumer-test-did
          status: PENDING
          policy:
            - uid: /policy/policy-0-uid
              permission:
                - type: permission
                  uid: /target/3f8d1b0e-8e2e-4b69-9b1f-089fe2f3e9d7
                  action: use
          vla:
            id: 2e99b60d-8cf7-4668-a234-96ebfd6a2b63
            kind: DataContract
            schema:
              name: xapi_statement
              logicalType: object
              properties:
                - name: actor
                  logicalType: object
                  required: true
                - name: verb
                  logicalType: object
                  required: true
                - name: object
                  logicalType: object
                  required: true
                - name: result
                  logicalType: object
                  required: true
                - name: timestamp
                  logicalType: string
                  required: true
              quality:
                - type: custom
                  engine: greatExpectations
                  implementation: >-
                    type: ExpectColumnValuesToBeBetween
                    kwargs:
                      column: timestamp
                      min_value: '2025-01-01T00:00:00Z'
                      max_value: '2026-01-01T00:00:00Z'
        data:
          actor:
            name: Jean Dupont
            mbox: mailto:jeandupont@example.com
          verb:
            id: http://adlnet.gov/expapi/verbs/interacted
          object:
            id: https://navy.mil/netc/xapi/activities/simulations/b9e16535-4fc9-4c66-ac87-3ad7ce515f5c/events/0221144
            definition:
              name:
                en-US: Event in Simulator
              description:
                en-US: You're wearing all your PPE
              type: http://adlnet.gov/expapi/activities/interaction
          result:
            success: true
          timestamp: '2025-03-16T03:25:00Z'
        attesterID: attester-0000
    AttestationRequest:
      allOf:
        - $ref: '#/components/schemas/VeracityRequest'
      required: [attesterID]
      properties:
        attesterID:
          type: string
    ProofRequest:
      allOf:
        - $ref: '#/components/schemas/VeracityRequest'
      required: [proverID]
      properties:
        proverID:
          type: string
    VerificationRequest:
      type: object
      required:
        - exchangeID
        - contractID
        - attesterAgentURL
        - attesterAgentLabel
      additionalProperties: false
      properties:
        exchangeID:
          type: string
        contractID:
          type: string
        attesterAgentURL:
          type: string
          format: url
        attesterAgentLabel:
          type: string
      example:
        exchangeID: xchg-0001
        contractID: contract-0001
        attesterAgentURL: http://aca-py-provider:8030
        attesterAgentLabel: provider
    EvaluationRequest:
      type: object
      required: [requirement, data]
      additionalProperties: false
      properties:
        requirement:
          $ref: https://raw.githubusercontent.com/bitol-io/open-data-contract-standard/refs/heads/main/schema/odcs-json-schema-latest.json#/$defs/DataQualityCustom
        data:
          type: object
      example:
        requirement:
          engine: JQ
          implementation: >-
            if .actor == 'Expected Actor'
            then { success: true, details: 'Actor name is correct' }
            else { success: false, details: 'Unexpected actor name' }
            end
        data:
          statement_id: 123
          actor: Unexpected Uriel
          action: read
          object: course_materials/lecturenotes/1
    EvaluationFromTemplateRequest:
      type: object
      required: [templateID, templateModel, data]
      additionalProperties: false
      properties:
        templateID:
          type: string
        templateModel:
          type: object
        data:
          type: object
      example:
        templateID: 74d696f2-b217-4d2f-a0c1-5ff65cd2258d
        templateModel:
          target_field: .actor
          required_value: Expected Actor
        data:
          statement_id: 123
          actor: Unexpected Uriel
          action: read
          object: course_materials/lecturenotes/1
    EvaluationResult:
      type: object
      required: [timestamp, success]
      additionalProperties: false
      properties:
        engine:
          type: QualityEngine
        timestamp:
          type: string
          format: datetime
        success:
          type: bool
        details:
          type: string
        error:
          type: string
      example:
        engine: JQ
        timestamp: '2026-01-31T17:48:10.904264Z'
        success: true
        details: Actor name is correct
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
    AnyValue: {}
    # ---- New schemas for the clean separation (veracity checks + credential issuance in the synchronous attestation flow) ----
    EvaluationBatchRequest:
      type: object
      required: [vla, data]
      properties:
        vla:
          type: object
          description: The full VLA document (as returned by the VLA MANAGER API).
        data:
          description: The raw data being attested (any JSON value).
    AovIssueRequest:
      type: object
      description: Body of `POST /aov/issue` — sent by the DVA API to the DVA VC MANAGER during credential issuance.
      required: [vcId, validSince, subject, issuerId, recordId, contractId, dataExchangeId, payload, evaluationResults]
      properties:
        vcId:
          type: string
          format: uuid
        validSince:
          type: string
        subject:
          type: string
        issuerId:
          type: string
        recordId:
          type: string
        contractId:
          type: string
        dataExchangeId:
          type: string
        payload:
          type: string
        evaluationResults:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationResult'
    AovIssueResponse:
      type: object
      description: Response of `POST /aov/issue` — the signed JWS plus metadata.
      required: [jws, vcId, issuerDidKey, vcIssuedDate]
      properties:
        jws:
          type: string
          description: Compact JWS `header.payload.signature` (Ed25519/EdDSA).
        vcId:
          type: string
          format: uuid
        issuerDidKey:
          type: string
          description: The issuer's `did:key` identifier.
        vcIssuedDate:
          type: string
    AoVResponse:
      type: object
      description: Synchronous response of `POST /attestation` (the final synchronous return to the PDC).
      required: [requestId, evaluationPassing, evaluationResults]
      properties:
        requestId:
          type: string
        issuerDidKey:
          type: string
          nullable: true
        jws:
          type: string
          nullable: true
          description: The AoV JWS — `null` when `evaluationPassing` is false.
        vcId:
          type: string
          nullable: true
        evaluationPassing:
          type: boolean
        evaluationResults:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationResult'
        vcIssuedDate:
          type: string
          nullable: true
    VerificationResponse:
      type: object
      description: Response of `POST /attestation/verify` and `POST /aov/verify`.
      required: [verified]
      properties:
        verified:
          type: boolean
        reason:
          type: string
          nullable: true
          description: Present when `verified` is false — explains why.
        payload:
          type: object
          nullable: true
          description: The decoded JWS payload — present only when `verified` is true.
    WhitelistEntry:
      type: object
      required: [id, didKey]
      properties:
        id:
          type: string
          format: uuid
        didKey:
          type: string
          description: The attester's `did:key` identifier.
        label:
          type: string
          nullable: true
    WhitelistAddRequest:
      type: object
      required: [didKey]
      properties:
        didKey:
          type: string
        label:
          type: string
          nullable: true
    OwnKey:
      type: object
      required: [issuerDidKey, keyPath]
      properties:
        issuerDidKey:
          type: string
        keyPath:
          type: string
  parameters:
    idParam:
      name: id
      description: A resource’s ID
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Id'
  responses:
    Created:
      description: >-
        The resource has been created successfully.
        You may be able to query the created resource later by the ID
        returned or refer to the resource using its ID in
        other requests.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IdObject'
    Deleted:
      description: >-
        The resource has been deleted successfully.
        The associated ID (if any) is no longer valid.
    Accepted:
      description: >-
        The request has been accepted for processing.
        You may be able to query the status of the processing by the
        ID returned.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IdObject'
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            Template:
              summary: Template not found
              value:
                type: NOT_FOUND
                message: Could not find VLA template with id 'foo-123'
            AoV:
              summary: Attestation (AoV) not found
              value:
                type: NOT_FOUND
                message: Could not find AoV with id 'bar-123'
            VLA:
              summary: VLA not found
              value:
                type: NOT_FOUND
                message: Could not find VLA with id 'bar-123'
    InvalidData:
      description: >-
        The request body was invalid.
        Please do not retry the request without correcting the payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            Template:
              summary: Template data invalid
              value:
                type: INVALID_DATA
                message: Invalid template data supplied
            TemplateRender:
              summary: Template model to render invalid
              value:
                type: INVALID_DATA
                message: Invalid template render request
            AoV:
              summary: Attestation (AoV) generation payload invalid
              value:
                type: INVALID_DATA
                message: Invalid AoV data supplied
    UpdatedTemplate:
      description: The template has been updated successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Template'
    Evaluated:
      description: The requirement has been evaluated successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EvaluationResult'
