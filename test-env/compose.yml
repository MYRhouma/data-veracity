---
# =============================================================================
# DVA — Clean separation compose
#
# Topology (one container per role):
#
#   PARTICIPANT (provider)                  DATA INTERMEDIARY
#   ─────────────────────────                ─────────────────────────
#   dva-api-provider          (9091)         vla-manager-api            (9099)
#   dva-vc-manager-provider   (8001)         dva-processing-vla-manager (--no-rmq, VLA-test only)
#   dva-processing-provider
#   postgres-provider         (5401)         postgres-vla-manager      (5409)
#   dva-dashboard-provider    (3011)
#
#   PARTICIPANT (consumer)
#   ─────────────────────────
#   dva-api-consumer          (9092)
#   dva-vc-manager-consumer   (8002)
#   dva-processing-consumer
#   postgres-consumer         (5402)
#   dva-dashboard-consumer    (3012)
#   vla-manager UI            (3020)  → points at vla-manager-api
#
# Synchronous attestation flow:
#   Initiation: PDC → POST /attestation on dva-api (data + vlaId)
#   VLA Resolution: dva-api → GET /vla/{id} on vla-manager-api (Data Intermediary)
#     vla-manager-api returns the full VLA document
#   Veracity Checks: dva-api → POST /evaluate-batch on dva-processing (data + VLA)
#     dva-processing returns array of (requirement, result) pairs
#   Credential Issuance: dva-api → POST /aov/issue on dva-vc-manager (claims + results)
#     dva-vc-manager returns the JWS (Ed25519/EdDSA via PyNaCl)
#   Synchronous Return: dva-api returns the AoV JWS synchronously to the PDC
#
# Legacy ACA-Py / RabbitMQ services are available via compose.acapy.yml.
# =============================================================================
services:
  # ---- PARTICIPANT (provider) ----
  dva-api-provider:
    extends:
      file: common-services.yml
      service: dva-api
    environment:
      DVA_PROCESSING_URL: http://dva-processing-provider:5000
      DVA_POSTGRES_URL: postgresql://postgres-provider:5432/dva
      DVA_VLA_MANAGER_URL: http://vla-manager-api:8000
      DVA_VC_MANAGER_URL: http://dva-vc-manager-provider:8000
      DVA_API_KEY: ""
    ports: [9091:9090]
    depends_on:
      dva-processing-provider: {condition: service_healthy}
      postgres-provider: {condition: service_healthy}
      vla-manager-api: {condition: service_started}
      dva-vc-manager-provider: {condition: service_started}
  dva-vc-manager-provider:
    extends:
      file: common-services.yml
      service: dva-vc-manager
    environment:
      DVA_VC_MANAGER_SIGNING_KEY_PATH: /data/dva-vc-signing-key.pem
      DVA_VC_MANAGER_DB_URL: postgresql://postgres-provider:5432/dva
      DVA_VC_MANAGER_API_KEY: ""
      DVA_VC_MANAGER_LOG_LEVEL: debug
    healthcheck:
      test: nc -z localhost 8000
      interval: 5s
      timeout: 5s
      retries: 3
    ports: [8001:8000]
    depends_on:
      postgres-provider: {condition: service_healthy}
  dva-processing-provider:
    extends:
      file: common-services.yml
      service: dva-processing
    environment:
      DVA_LOG_LEVEL: debug
    healthcheck:
      test: nc -z localhost 5000
      interval: 5s
      timeout: 5s
      retries: 3
  postgres-provider:
    extends:
      file: common-services.yml
      service: postgres
    ports: [5401:5432]
  dva-dashboard-provider:
    extends:
      file: common-services.yml
      service: dva-dashboard
    environment:
      DVA_API_URL: http://dva-api-provider:9090
    ports: [3011:80]
    depends_on:
      dva-api-provider: {condition: service_healthy}

  # ---- PARTICIPANT (consumer) ----
  dva-api-consumer:
    extends:
      file: common-services.yml
      service: dva-api
    environment:
      DVA_PROCESSING_URL: http://dva-processing-consumer:5000
      DVA_POSTGRES_URL: postgresql://postgres-consumer:5432/dva
      DVA_VLA_MANAGER_URL: http://vla-manager-api:8000
      DVA_VC_MANAGER_URL: http://dva-vc-manager-consumer:8000
      DVA_API_KEY: ""
    ports: [9092:9090]
    depends_on:
      dva-processing-consumer: {condition: service_healthy}
      postgres-consumer: {condition: service_healthy}
      vla-manager-api: {condition: service_started}
      dva-vc-manager-consumer: {condition: service_started}
  dva-vc-manager-consumer:
    extends:
      file: common-services.yml
      service: dva-vc-manager
    environment:
      DVA_VC_MANAGER_SIGNING_KEY_PATH: /data/dva-vc-signing-key.pem
      DVA_VC_MANAGER_DB_URL: postgresql://postgres-consumer:5432/dva
      DVA_VC_MANAGER_API_KEY: ""
      DVA_VC_MANAGER_LOG_LEVEL: debug
    healthcheck:
      test: nc -z localhost 8000
      interval: 5s
      timeout: 5s
      retries: 3
    ports: [8002:8000]
    depends_on:
      postgres-consumer: {condition: service_healthy}
  dva-processing-consumer:
    extends:
      file: common-services.yml
      service: dva-processing
    environment:
      DVA_LOG_LEVEL: debug
    healthcheck:
      test: nc -z localhost 5000
      interval: 5s
      timeout: 5s
      retries: 3
  postgres-consumer:
    extends:
      file: common-services.yml
      service: postgres
    ports: [5402:5432]
  dva-dashboard-consumer:
    extends:
      file: common-services.yml
      service: dva-dashboard
    environment:
      DVA_API_URL: http://dva-api-consumer:9090
    ports: [3012:80]
    depends_on:
      dva-api-consumer: {condition: service_healthy}

  # ---- DATA INTERMEDIARY ----
  vla-manager-api:
    extends:
      file: common-services.yml
      service: vla-manager-api
    environment:
      VLA_MANAGER_DB_URL: postgresql://postgres-vla-manager:5432/dva
      VLA_MANAGER_API_KEY: ""
      VLA_MANAGER_API_LOG_LEVEL: debug
    healthcheck:
      test: nc -z localhost 8000
      interval: 5s
      timeout: 5s
      retries: 3
    ports: [9099:8000]
    depends_on:
      postgres-vla-manager: {condition: service_healthy}
  dva-processing-vla-manager:
    extends:
      file: common-services.yml
      service: dva-processing
    environment:
      DVA_LOG_LEVEL: debug
    healthcheck:
      test: nc -z localhost 5000
      interval: 5s
      timeout: 5s
      retries: 3
  postgres-vla-manager:
    extends:
      file: common-services.yml
      service: postgres
    ports: [5409:5432]
  vla-manager:
    extends:
      file: common-services.yml
      service: vla-manager
    environment:
      VLA_MANAGER_BACKEND_URL: http://vla-manager-api:8000
    ports: [3020:80]
    depends_on:
      vla-manager-api: {condition: service_started}

  # ---- KARATE (test profile) ----
  karate:
    profiles: [karate]
    extends:
      file: common-services.yml
      service: karate
    depends_on:
      dva-api-provider: {condition: service_healthy}
      dva-api-consumer: {condition: service_healthy}
      dva-processing-provider: {condition: service_started}
      dva-processing-consumer: {condition: service_started}
      vla-manager-api: {condition: service_started}